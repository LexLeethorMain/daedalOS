name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --openssl-legacy-provider   # ← this must be here
    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20    # ← stay on 18

      - name: Install dependencies
        run: yarn install

      - name: Prebuild
        run: yarn build:prebuild

      - name: Build
        run: yarn build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out   # we'll confirm this in a sec

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
